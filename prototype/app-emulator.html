<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOJOO FARM — 앱 에뮬레이터 (구현 반영)</title>
<style>
:root{
  --green:#2E7D32;--green-d:#1B5E20;--green-l:#A5D6A7;--green-bg:#F1F8E9;
  --teal:#00897B;--teal-d:#00695C;--teal-l:#80CBC4;--teal-bg:#E0F2F1;
  --amber:#FFA000;--red:#E53935;--blue:#1E88E5;
  --ink:#1F2937;--muted:#6B7280;--line:#E5E7EB;--bg:#F3F4F6;--card:#fff;
  --shadow:0 6px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,'Malgun Gothic',sans-serif;background:#0f172a;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:14px}
.top{position:sticky;top:0;z-index:80;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.title{color:#e2e8f0;font-size:13px;font-family:monospace}
.switch{display:flex;gap:6px;background:#1e293b;padding:6px;border-radius:999px}
.switch button{border:none;background:transparent;color:#94a3b8;font-size:13px;font-weight:700;padding:9px 18px;border-radius:999px;cursor:pointer}
.switch button.on.m{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff}
.switch button.on.s{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff}
.conn{display:flex;gap:6px;align-items:center;background:#1e293b;padding:6px 10px;border-radius:12px;color:#cbd5e1;font-size:12px}
.conn input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:5px 8px;font-size:12px;width:190px}
.conn .dot{width:8px;height:8px;border-radius:50%;background:#64748b}
.conn.live .dot{background:#22c55e}
.conn button{border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;background:#334155;color:#e2e8f0}
.phone{position:relative;width:390px;height:820px;background:var(--bg);border-radius:44px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 12px #111827,0 0 0 13px #1f2937;display:none}
.phone.show{display:block}
.phone.slave{background:var(--teal-bg)}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#111827;border-radius:0 0 18px 18px;z-index:60}
.screen{position:absolute;inset:0;overflow-y:auto;padding-bottom:84px;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.page{display:none;min-height:100%;animation:fade .22s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.appbar{position:sticky;top:0;background:var(--green);color:#fff;padding:16px;font-size:18px;font-weight:700;z-index:30;display:flex;align-items:center;justify-content:space-between}
.phone.slave .appbar{background:var(--teal)}
.appbar .act{font-size:14px;font-weight:600;cursor:pointer;opacity:.95}
.pad{padding:16px;display:flex;flex-direction:column;gap:12px}
.tabs{position:absolute;bottom:0;left:0;right:0;height:74px;background:rgba(255,255,255,.97);border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;z-index:40}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;cursor:pointer;flex:1}
.tab .ic{font-size:22px}
.tab.on{color:var(--green)}
.h1{font-size:22px;font-weight:800}
.h2{font-size:16px;font-weight:700}
.sub{color:var(--muted);font-size:13px}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.card.click{cursor:pointer;transition:transform .1s}.card.click:active{transform:scale(.985)}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}
.cat{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;background:#fff;color:var(--muted);border:1px solid var(--line);white-space:nowrap;cursor:pointer}
.cat.on{background:var(--green);color:#fff;border-color:var(--green)}
.ok{background:#E8F5E9;color:var(--green-d)}.off{background:#ECEFF1;color:#607D8B}.warn{background:#FFF3E0;color:#E65100}
.btn{border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff}
.btn-gh{background:#fff;color:var(--green);border:1.5px solid var(--green)}
.btn-ght{background:#fff;color:var(--teal);border:1.5px solid var(--teal)}
.btn-red{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.btn.sm{width:auto;padding:10px 14px;font-size:13px}
input.f,select.f{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit}
input.f:focus{outline:none;border-color:var(--green)}
.phone.slave input.f:focus{border-color:var(--teal)}
.lbl{font-size:13px;font-weight:700;color:var(--muted)}
.weather{background:linear-gradient(135deg,#4FC3F7,#1E88E5);color:#fff;border-radius:16px;padding:16px}
.toggle{width:46px;height:26px;border-radius:999px;background:#cbd5e1;position:relative;cursor:pointer;transition:.2s;flex:0 0 auto}
.toggle.on{background:var(--green)}.phone.slave .toggle.on{background:var(--teal)}
.toggle i{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on i{left:22px}
.cam{height:170px;border-radius:16px;background:linear-gradient(160deg,#66BB6A,#2E7D32);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff}
.cam .rec{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.4);padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700}
.cam .rec i{width:8px;height:8px;border-radius:50%;background:#ff5252;animation:blink 1s infinite}
.cam .cross{position:absolute;width:60%;height:60%;border:2px dashed rgba(255,255,255,.5);border-radius:10px}
.scanline{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#B9F6CA,transparent);box-shadow:0 0 12px #B9F6CA;animation:scan 1.8s linear infinite}
@keyframes scan{0%{top:8%}100%{top:92%}}
@keyframes blink{50%{opacity:.3}}
.log{font-family:monospace;font-size:11px;color:#374151;line-height:1.7;max-height:150px;overflow:auto}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.6s infinite}
.phone.slave .pulse{background:var(--teal)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,125,50,.5)}70%{box-shadow:0 0 0 10px rgba(46,125,50,0)}100%{box-shadow:0 0 0 0 rgba(46,125,50,0)}}
.codebox{background:#111827;color:#fff;border-radius:16px;padding:22px;text-align:center;letter-spacing:8px;font-size:34px;font-weight:800;font-family:monospace}
.back{color:#fff;cursor:pointer;font-size:20px;font-weight:700}
.noti{border-left:4px solid var(--line);padding:12px 14px;border-radius:10px;background:#fff;box-shadow:var(--shadow)}
.toast{position:absolute;bottom:92px;left:16px;right:16px;background:#111827;color:#fff;padding:13px 16px;border-radius:12px;font-size:13px;z-index:70;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1}
.stat{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.stat:last-child{border:none}
.hint{font-size:11px;color:#94a3b8;text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="top">
  <div class="title">OOJOO FARM · 구현 반영 인터랙티브 에뮬레이터 · 390×820</div>
  <div class="switch">
    <button id="swM" class="on m" onclick="setApp('master')">Master 앱</button>
    <button id="swS" class="s" onclick="setApp('slave')">Slave (Farmer) 앱</button>
  </div>
  <div class="conn" id="conn">
    <span class="dot"></span>
    <span id="connLabel">Mock</span>
    <input id="baseUrl" value="http://localhost:4000" placeholder="백엔드 URL">
    <button onclick="toggleLive()">Live 연결</button>
  </div>
</div>

<!-- ===================== MASTER ===================== -->
<div class="phone master show" id="phoneM">
  <div class="notch"></div>
  <div class="screen" id="mScreen"></div>
  <div class="tabs" id="mTabs" style="display:none">
    <div class="tab" data-t="home" onclick="mGo('home')"><span class="ic">🏠</span>홈</div>
    <div class="tab" data-t="plants" onclick="mGo('plants')"><span class="ic">🌱</span>식물</div>
    <div class="tab" data-t="farmers" onclick="mGo('farmers')"><span class="ic">🤖</span>Farmer</div>
    <div class="tab" data-t="market" onclick="mGo('market')"><span class="ic">🛒</span>마켓</div>
    <div class="tab" data-t="community" onclick="mGo('community')"><span class="ic">👥</span>이웃</div>
  </div>
  <div class="toast" id="mToast"></div>
</div>

<!-- ===================== SLAVE ===================== -->
<div class="phone slave" id="phoneS">
  <div class="notch"></div>
  <div class="screen" id="sScreen"></div>

    {id:'prd_seed_02',category:'seed',name:'바질 모종 3포트',description:'허브 초보용 모종.',price:6900,vendor:'self',image:'🌱',affiliate_url:null,stock:150,rating:4.5},
    {id:'prd_water_01',category:'watering',name:'12V 솔레노이드 밸브',description:'자동 관수 전자 밸브.',price:8900,vendor:'self',image:'🚰',affiliate_url:null,stock:90,rating:4.5},
    {id:'prd_water_02',category:'watering',name:'소형 워터펌프 세트',description:'탱크→화분 급수 펌프+호스.',price:13900,vendor:'self',image:'💧',affiliate_url:null,stock:70,rating:4.4},

  ],

    {id:'bdl_starter',name:'초보 자동재배 스타터 키트',description:'ESP32+밸브+펌프+배양토+씨앗',price:39900,image:'📦',items:[{id:'prd_ctrl_01',name:'ESP32 컨트롤러',price:9900},{id:'prd_water_01',name:'밸브',price:8900},{id:'prd_seed_01',name:'토마토 씨앗',price:3900}]},

    {id:'cp1',user_id:'u_a',type:'share',title:'상추 너무 많이 자랐어요 나눔해요',crop:'상추',quantity:'한 봉지',price:null,region:'Seoul',description:'베란다 상추가 폭발했어요. 필요하신 이웃 댓글 주세요!',image:'🥬',status:'open',created_at:'2026-07-03 09:10',author_name:'초록엄지',author_score:12,author_deals:8,

  ]

// ---------- API 계층 (Live / Mock) ----------
async function api(path, opts){
  if(!S.live) throw new Error('mock');
  const r = await fetch(S.base.replace(/\/$/,'') + path, {
    headers:{'Content-Type':'application/json', ...(opts&&opts.headers)}, ...opts
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
const jpost=(p,b,h)=>api(p,{method:'POST',body:JSON.stringify(b),headers:h});
const jget=(p,h)=>api(p,{headers:h});

function toggleLive(){
  S.base = document.getElementById('baseUrl').value.trim();
  S.live = !S.live;
  document.getElementById('conn').classList.toggle('live',S.live);
  document.getElementById('connLabel').textContent = S.live?'Live':'Mock';
  toast(S.app, S.live? '실제 백엔드에 연결했습니다':'Mock 모드로 전환');
}

// ---------- 공통 ----------
function setApp(a){
  S.app=a;
  document.getElementById('phoneM').classList.toggle('show',a==='master');
  document.getElementById('phoneS').classList.toggle('show',a==='slave');
  document.getElementById('swM').className='m'+(a==='master'?' on':'');
  document.getElementById('swS').className='s'+(a==='slave'?' on':'');
}
function toast(app,msg){
  const t=document.getElementById(app==='master'?'mToast':'sToast');
  t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200);
}
const esc=s=>(s==null?'':(''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
const stageK={seedling:'묘목',vegetative:'영양생장',flowering:'개화',fruiting:'결실'};

// =================== MASTER ===================
function mTabs(show,cur){
  const t=document.getElementById('mTabs');t.style.display=show?'flex':'none';
  t.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===cur));
}
async function mGo(page){
  S.m.page=page;
  const withTab=['home','plants','farmers','market','community'].includes(page);
  mTabs(withTab,page);
  const sc=document.getElementById('mScreen');
  if(page==='onboarding'){ sc.innerHTML=mOnboarding(); return; }
  if(page==='home'){ await mLoadHome(); sc.innerHTML=mHome(); return; }
  if(page==='plants'){ await mLoadPlants(); sc.innerHTML=mPlants(); return; }
  if(page==='plantDetail'){ sc.innerHTML=mPlantDetail(); return; }
  if(page==='register'){ sc.innerHTML=mRegister(); return; }
  if(page==='farmers'){ await mLoadHome(); sc.innerHTML=mFarmers(); return; }
  if(page==='pairing'){ sc.innerHTML=mPairing(); return; }
  if(page==='notifications'){ await mLoadNoti(); sc.innerHTML=mNoti(); return; }
  if(page==='market'){ await mLoadMarket(); sc.innerHTML=mMarket(); return; }
  if(page==='product'){ sc.innerHTML=mProduct(); return; }
  if(page==='cart'){ sc.innerHTML=mCart(); return; }
  if(page==='orders'){ await mLoadOrders(); sc.innerHTML=mOrders(); return; }
  if(page==='community'){ await mLoadCommunity(); sc.innerHTML=mCommunity(); return; }
  if(page==='post'){ sc.innerHTML=mPost(); return; }
  if(page==='cwrite'){ sc.innerHTML=mCwrite(); return; }
  if(page==='report'){ sc.innerHTML=mReport(); return; }
  if(page==='sub'){ sc.innerHTML=mSub(); return; }
}
async function mLoadHome(){
  try{
    if(S.live){
      S.m.slaves=(await jget('/api/pairing/'+S.m.userId)).slaves;
      S.m.plants=(await jget('/api/plants/'+S.m.userId)).plants;
      S.m.weather=await jget('/api/weather/'+encodeURIComponent(S.m.region));
    } else { S.m.slaves=MOCK.slaves; S.m.plants=MOCK.plants; S.m.weather=MOCK.weather; }

async function mLoadMarket(){
  try{

      S.m.categories=MOCK.categories;
      S.m.products=MOCK.products.filter(p=>(S.m.mkCat==='all'||p.category===S.m.mkCat) &&
        (!S.m.mkQuery || (p.name+p.description).toLowerCase().includes(S.m.mkQuery.toLowerCase())));
      S.m.bundles=MOCK.bundles;
      S.m.recos=MOCK.products.filter(p=>['prd_ctrl_01','prd_fert_01','prd_seed_01'].includes(p.id));
    }
  }catch(e){ S.m.categories=MOCK.categories; S.m.products=MOCK.products; S.m.bundles=MOCK.bundles; S.m.recos=[]; toast('master','마켓 조회 실패 — Mock'); }

function cartTotal(){ return S.m.cart.reduce((a,c)=>a+c.price*c.qty,0); }
function cartAdd(id){ const p=(S.m.products.concat(MOCK.products)).find(x=>x.id===id)||MOCK.products.find(x=>x.id===id); if(!p)return;
  const e=S.m.cart.find(c=>c.id===id); if(e)e.qty++; else S.m.cart.push({id:p.id,name:p.name,price:p.price,image:p.image,qty:1}); toast('master','장바구니에 담음'); }
function cartAddRaw(o){ const e=S.m.cart.find(c=>c.id===o.id); if(e)e.qty++; else S.m.cart.push({id:o.id,name:o.name,price:o.price,image:o.image||'📦',qty:1}); }
function cartInc(id){ const e=S.m.cart.find(c=>c.id===id); if(e)e.qty++; mGo('cart'); }
function cartDec(id){ const i=S.m.cart.findIndex(c=>c.id===id); if(i<0)return; if(S.m.cart[i].qty>1)S.m.cart[i].qty--; else S.m.cart.splice(i,1); mGo('cart'); }

function mCart(){

async function mCheckout(){
  if(!S.m.cart.length) return;
  try{
    let total=cartTotal(), id='ord_'+Date.now().toString(36);
    if(S.live){ const r=await jpost('/api/market/orders',{userId:S.m.userId,items:S.m.cart.map(c=>({productId:c.id,qty:c.qty}))}); total=r.total; id=r.orderId; }
    else { S.m.orders.unshift({id,total,status:'paid',created_at:new Date().toISOString().slice(0,16).replace('T',' '),items:S.m.cart.map(c=>({name:c.name,qty:c.qty,price:c.price}))}); }

const cTypeLabel=t=>({share:'나눔',sell:'판매',buy:'구입'}[t]||t);

async function mLoadCommunity(){
  try{

      S.m.cposts=MOCK.cposts.filter(p=>(!S.m.cType||p.type===S.m.cType) &&

// =================== SLAVE ===================
async function sGo(page){
  S.s.page=page;
  const sc=document.getElementById('sScreen');
  if(page==='pairing'){ sc.innerHTML=sPairing(); return; }
  if(page==='dashboard'){ sc.innerHTML=sDashboard(); return; }
  if(page==='settings'){ sc.innerHTML=sSettings(); return; }
}
function sPairing(){
  return `<div class="appbar">마스터 연결</div><div class="pad">
    <p class="sub">마스터 앱에서 받은 페어링 코드를 입력하세요.</p>
    <div class="lbl">페어링 코드 (6자리)</div><input class="f" id="spCode" maxlength="6" placeholder="ABC123" style="letter-spacing:4px;text-transform:uppercase">
    <div class="lbl">서버 주소</div><input class="f" id="spServer" value="${esc(S.base)}">
    <button class="btn btn-teal" onclick="sVerify()">연결</button>
    <div class="hint">Master 앱의 "페어링 코드 생성"에서 만든 코드${S.m.pairCode?' (예: '+S.m.pairCode+')':''}</div>
  </div>`;
}
async function sVerify(){
  const code=document.getElementById('spCode').value.trim().toUpperCase();
  S.base=document.getElementById('spServer').value.trim();
  if(code.length<6){ toast('slave','6자리 코드를 입력하세요'); return; }
  try{
    if(S.live){ const r=await jpost('/api/pairing/verify',{code}); S.s.slaveId=r.slaveId; S.s.sessionKey=r.sessionKey; }
    else { S.s.slaveId='slv_'+Date.now().toString(36); S.s.sessionKey='mock-session'; }
    sBoot(); toast('slave','페어링 완료 — 자율 관리 시작'); sGo('dashboard');
  }catch(e){ toast('slave','연결 실패: '+e.message); }
}
function sBoot(){
  S.s.logs=['['+t()+'] 엔진 시작','['+t()+'] 헤드리스 서비스 기동'];
  S.s.status='자율 관리 동작 중';
  // 관찰/분석 시뮬레이션 루프
  clearInterval(S.s._loop);
  S.s._loop=setInterval(()=>{ if(S.s.page!=='dashboard') return; sTick(); },4000);
}
function t(){const d=new Date();return d.toTimeString().slice(0,8);}
function sTick(){
  const green=Math.round(20+Math.random()*40), bright=Math.round(30+Math.random()*40);
  const need=green<28 && bright>15;
  const ripeness=Math.round(Math.random()*100), pest=Math.random()<0.25;
  S.s.analysis={green,bright,need,ripeness,pest,status:green>45?'건강 (녹색 충분)':green>25?'보통':'주의 (황변 의심)'};
  sLog(`분석: ${S.s.analysis.status} (녹색:${green}%, 익음도:${ripeness}%)`);
  if(S.s.autoOn && need){ sLog('AI 판정: 수분 부족 → 자동 관수'); sWater('auto'); }
  else S.s.status = S.s.autoOn? '관찰 완료: '+S.s.analysis.status : '자율 관리 일시정지';
  // 수확/해충 자율 파이프라인
  if(ripeness>=70){ sLog('🍅 수확 적기 감지 → 마스터 알림'); }
  if(pest){
    sLog('🐛 해충 감지 → Fan 자동 퇴치(10초)');
    S.s.pendingLaser=true; sLog('🐛 Laser 퇴치 마스터 승인 요청');
  }
  if(S.s.page==='dashboard') document.getElementById('sScreen').innerHTML=sDashboard();
}
function sLog(m){ S.s.logs=['['+t()+'] '+m,...S.s.logs].slice(0,20); }
async function sWater(source){
  const amt = source==='auto'? Math.round(300*1.25):300;
  const ms=Math.min(60000,Math.max(500,amt*20));
  sLog(`급수 밸브 개방 ${ms}ms (하드웨어:${S.s.hw?'연결':'시뮬'})`);
  sLog(`${source==='auto'?'자율':'수동'} 관수 ${amt}ml`);
  S.s.lastWater=t(); S.s.status=`${source==='auto'?'자율':'수동'} 관수 실행 (${amt}ml)`;
  try{ if(S.live&&S.s.slaveId) await jpost('/api/watering/log',{slaveId:S.s.slaveId,amountMl:amt,source,weatherFactor:1.25},{'x-session-key':S.s.sessionKey}); }catch(e){}
  if(S.s.page==='dashboard') document.getElementById('sScreen').innerHTML=sDashboard();
}
function sDashboard(){
  const a=S.s.analysis;
  const logs=S.s.logs.map(l=>esc(l)).join('<br>')||'로그 없음';
  return `<div class="appbar">Farmer 대시보드 <span class="act" onclick="sGo('settings')">설정</span></div><div class="pad">
    <div class="card">
      <div style="font-weight:700">온디바이스 AI 자율 관리</div>
      <div class="sub">Slave: ${esc((S.s.slaveId||'').slice(0,8))}… ${S.s.autoOn?'· 🟢 온라인':''}</div>
      <div class="sub">식물: 방울토마토 (토마토)</div>
      <div class="sub">상태: ${esc(S.s.status)}</div>
      <div class="between" style="margin-top:10px"><span>자율 관리</span><div class="toggle ${S.s.autoOn?'on':''}" onclick="sToggle('autoOn')"><i></i></div></div>
      <div class="between" style="margin-top:8px"><span>헤드리스 모드 (화면 꺼도 동작)</span><div class="toggle ${S.s.headless?'on':''}" onclick="sToggle('headless')"><i></i></div></div>
      <div class="sub" style="margin-top:8px">날씨 가중치: ×1.25</div>
    </div>
    <div class="cam"><div class="rec"><i></i>LIVE</div><div class="cross"></div><div class="scanline"></div><div style="font-size:40px">🍅</div></div>
    ${S.s.pendingLaser?`<div class="card" style="background:#FFEBEE"><div class="sub">🐛 해충 감지 — Laser 퇴치 마스터 승인 대기 중</div></div>`:''}
    ${a?`<div class="card"><div style="font-weight:700">최근 분석</div>
      <div class="sub">상태: ${esc(a.status)}</div>
      <div class="sub">녹색도: ${a.green}% / 밝기: ${a.bright}%</div>
      <div class="sub">수분 필요: ${a.need?'예':'아니오'}</div>
      <div class="sub">열매 익음도: ${a.ripeness||0}% · 해충 의심: ${a.pest?'예':'아니오'}</div></div>`:''}
    <div class="row"><button class="btn btn-teal" onclick="sTick()">즉시 캡처</button><button class="btn btn-ght" onclick="sWater('manual')">수동 관수</button></div>
    <div class="h2">이벤트 로그</div><div class="card"><div class="log">${logs}</div></div>
  </div>`;
}
function sToggle(k){
  S.s[k]=!S.s[k];
  if(k==='autoOn') S.s.status=S.s.autoOn?'자율 관리 동작 중':'자율 관리 일시정지';
  if(k==='headless') toast('slave',S.s.headless?'헤드리스 모드 ON — 화면 꺼도 서비스 지속':'헤드리스 모드 OFF');
  document.getElementById('sScreen').innerHTML=sDashboard();
}
function sSettings(){
  return `<div class="appbar"><span class="back" onclick="sGo('dashboard')">‹</span> Farmer 설정 <span></span></div><div class="pad">
    <div class="lbl">재배 지역 (날씨 조회용)</div><input class="f" id="stRegion" value="${esc(S.s.region)}">
    <div class="lbl">캡처 주기 (분)</div><input class="f" id="stInterval" value="60">
    <div class="between"><span>자율 관수</span><div class="toggle ${S.s.autoOn?'on':''}" onclick="sToggle('autoOn')"><i></i></div></div>
    <hr style="border:none;border-top:1px solid var(--line)">
    <div class="h2">하드웨어 (ESP32)</div>
    <button class="btn ${S.s.hw?'btn-teal':'btn-ght'}" onclick="sConnectHw()">${S.s.hw?'✓ BLE 하드웨어 연결됨':'급수/Fan/Laser 하드웨어 BLE 연결'}</button>
    <div class="hint">Nordic UART Service · Fail-safe 자동 정지 내장</div>
    <button class="btn btn-teal" onclick="sSaveSettings()">저장</button>
  </div>`;
}
function sConnectHw(){ S.s.hw=true; sLog('ESP32 BLE 연결됨 (Nordic UART)'); toast('slave','하드웨어 연결됨 — 실제 밸브 제어 활성'); sGo('settings'); }
function sSaveSettings(){ S.s.region=document.getElementById('stRegion').value.trim()||'Seoul'; toast('slave','저장됨'); sGo('dashboard'); }

// ---------- 시작 ----------
mGo('onboarding');
sGo('pairing');
</script>
</body>
</html>
