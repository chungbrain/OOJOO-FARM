<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우주 팜 (OOJOO FARM) Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8F9FA;
            --primary-green: #2ECC71;
            --primary-dark: #27AE60;
            --text-dark: #2C3E50;
            --text-muted: #95A5A6;
            --card-bg: #FFFFFF;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Frame */
        .device {
            width: 390px;
            height: 844px;
            background-color: var(--bg-color);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
            border: 8px solid #FFFFFF;
        }

        /* Top Bar */
        .top-bar {
            padding: 40px 24px 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting h1 {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .greeting p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .profile-pic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-green), #1ABC9C);
            box-shadow: var(--shadow-sm);
        }

        /* Main Content */
        .content {
            padding: 0 24px;
            height: calc(100% - 180px);
            overflow-y: auto;
            padding-bottom: 100px; /* Space for bottom nav */
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        /* 3D Viewer Placeholder */
        .farm-view {
            width: 100%;
            height: 240px;
            background: linear-gradient(145deg, #E0F2FE, #BAE6FD);
            border-radius: 28px;
            margin-bottom: 24px;
            position: relative;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .farm-view::before {
            content: "🌱";
            font-size: 80px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* Environment Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Section Title */
        .section-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 16px;
        }

        /* Action Card */
        .action-card {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            padding: 24px;
            border-radius: 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .action-card:active {
            transform: scale(0.98);
        }

        .action-text h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .action-text p {
            font-size: 13px;
            opacity: 0.9;
        }

        .action-icon {
            background: rgba(255, 255, 255, 0.2);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        /* Floating Bottom Navigation */
        .bottom-nav {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 72px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-muted);
        }

        .nav-item.active {
            color: var(--primary-dark);
            transform: translateY(-8px);
        }

        .nav-item i {
            font-size: 24px;
            font-style: normal;
            margin-bottom: 4px;
            transition: transform 0.2s;
        }

        .nav-item.active i {
            transform: scale(1.2);
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-item.active span {
            opacity: 1;
        }

        /* Plant Registration Modal (Overlay) */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            background: white;
            width: 100%;
            height: 80%;
            border-radius: 32px 32px 40px 40px;
            padding: 32px 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .bottom-sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #E2E8F0;
            border-radius: 2px;
            margin: 0 auto 24px auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            font-size: 16px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
            background: #F8F9FA;
        }

        .form-control:focus {
            border-color: var(--primary-green);
            background: white;
        }

        .btn-submit {
            margin-top: auto;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: transform 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
        
    </style>
</head>
<body>

    <div class="device">
        <!-- Header -->
        <div class="top-bar">
            <div class="greeting">
                <h1>안녕하세요, 우주님!</h1>
                <p>오늘도 농장이 싱그럽네요 🌿</p>
            </div>
            <div class="profile-pic"></div>
        </div>

        <!-- Main Content -->
        <div class="content">
            
            <!-- 3D Viewer Placeholder -->
            <div class="farm-view">
                <div class="badge">Live 3D View</div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">🌡️</div>
                    <div class="stat-value">24°C</div>
                    <div class="stat-label">온도</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💧</div>
                    <div class="stat-value">62%</div>
                    <div class="stat-label">습도</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🌱</div>
                    <div class="stat-value">좋음</div>
                    <div class="stat-label">토양 수분</div>
                </div>
            </div>

            <!-- Action -->
            <h2 class="section-title">빠른 액션</h2>
            <div class="action-card" onclick="openModal()">
                <div class="action-text">
                    <h3>새로운 식물 등록</h3>
                    <p>농장에 새로운 친구를 추가하세요</p>
                </div>
                <div class="action-icon">➕</div>
            </div>

        </div>

        <!-- Floating Bottom Nav -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab(this)">
                <i>🏡</i>
                <span>홈</span>
            </div>
            <div class="nav-item" onclick="switchTab(this)">
                <i>🌱</i>
                <span>식물</span>
            </div>
            <div class="nav-item" onclick="switchTab(this)">
                <i>🤖</i>
                <span>Farmer</span>
            </div>
            <div class="nav-item" onclick="switchTab(this)">
                <i>🛒</i>
                <span>마켓</span>
            </div>
            <div class="nav-item" onclick="switchTab(this)">
                <i>🏘️</i>
                <span>이웃</span>
            </div>
        </div>

        <!-- Plant Registration Modal -->
        <div class="modal-overlay" id="regModal">
            <div class="bottom-sheet">
                <div class="sheet-handle" onclick="closeModal()"></div>
                <h2 class="section-title" style="margin-bottom: 24px;">식물 등록</h2>
                
                <div class="form-group">
                    <label>식물 이름 (애칭)</label>
                    <input type="text" class="form-control" placeholder="예: 방울이">
                </div>

                <div class="form-group">
                    <label>작물 종류</label>
                    <select class="form-control">
                        <option value="" disabled selected>작물을 선택하세요</option>
                        <option>상추</option>
                        <option>깻잎</option>
                        <option>바질</option>
                        <option>로즈마리</option>
                        <option>방울토마토</option>
                        <option>딸기</option>
                        <option>직접 입력...</option>
                    </select>
                </div>

                <button class="btn-submit" onclick="closeModal()">농장에 추가하기</button>
            </div>
        </div>

    </div>

    <script>
        function switchTab(element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function openModal() {
            document.getElementById('regModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('regModal').classList.remove('active');
        }
    </script>
</body>
</html>
