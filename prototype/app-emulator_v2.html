<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOJOO FARM — App Emulator v2 Cartoon</title>
<style>
/* ============ CARTOON DESIGN TOKENS ============ */
:root{
  /* Master — Bright Cartoon Green */
  --g:#4CAF50; --gd:#2E7D32; --gl:#A5D6A7; --gx:#E8F5E9; --gbg:#F1F8E9;
  --lime:#C6FF00;
  /* Slave — Fun Teal */
  --t:#26A69A; --td:#00695C; --tl:#80CBC4; --tx:#E0F2F1; --tbg:#E0F2F1;
  /* Accent — Vibrant Cartoon Tones */
  --amber:#FFC107; --orange:#FF6F00; --red:#FF5252; --blue:#42A5F5; --sky:#4FC3F7; --purple:#AB47BC; --pink:#FF80AB;
  /* Neutral — Warm Cartoon Ink */
  --ink:#2D3436; --ink2:#4A4A4A; --muted:#7C7C7C; --muted2:#A0A0A0; --line:#E0E0E0; --line2:#F0F0F0;
  --bg:#FFF8E1; --card:#FFFFFF; --glass:rgba(255,255,255,.92);
  /* Cartoon Shadows — hard offset, no blur */
  --shadow-sm:2px 2px 0 rgba(0,0,0,.08);
  --shadow:4px 4px 0 rgba(0,0,0,.1);
  --shadow-lg:6px 6px 0 rgba(0,0,0,.12);
  --shadow-pop:0 8px 0 rgba(0,0,0,.15);
  /* Cartoon Radii — extra round */
  --radius:24px; --radius-sm:18px; --radius-xs:12px; --radius-pill:999px;
  /* Cartoon Borders — thick outlines */
  --border:3px solid var(--ink);
  --border-thin:2px solid var(--ink);
  /* Gradients — bright, playful */
  --grad-g:linear-gradient(135deg,#66BB6A,#2E7D32);
  --grad-t:linear-gradient(135deg,#26A69A,#004D40);
  --grad-weather:linear-gradient(135deg,#4FC3F7,#1976D2);
  --grad-cam:linear-gradient(160deg,#81C784,#2E7D32);
  --grad-lime:linear-gradient(135deg,#C6FF00,#2E7D32);
  --grad-sun:linear-gradient(135deg,#FFD54F,#FF9800);
  --grad-candy:linear-gradient(135deg,#FF80AB,#AB47BC);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Comic Sans MS','Segoe UI',system-ui,'Malgun Gothic',cursive,sans-serif;background:linear-gradient(180deg,#1a1a2e,#16213e);color:var(--ink);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:14px}

/* ============ TOP BAR ============ */
.top{position:sticky;top:0;z-index:80;display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px}
.title{color:#FFD54F;font-size:16px;font-weight:700;letter-spacing:.5px;text-shadow:2px 2px 0 rgba(0,0,0,.3)}
.title small{color:#94A3B8;font-weight:400;font-size:12px}
.switch{display:flex;gap:4px;background:rgba(255,255,255,.1);padding:6px;border-radius:var(--radius-pill);border:2px solid rgba(255,255,255,.15)}
.switch button{border:none;background:transparent;color:#94A3B8;font-size:14px;font-weight:700;padding:10px 24px;border-radius:var(--radius-pill);cursor:pointer;transition:all .2s}
.switch button.on.m{background:var(--grad-g);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.3)}
.switch button.on.s{background:var(--grad-t);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.3)}
.conn{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.08);padding:8px 14px;border-radius:16px;border:2px solid rgba(255,255,255,.12);color:#cbd5e1;font-size:12px}
.conn input{background:#0f172a;border:2px solid #334155;color:#e2e8f0;border-radius:10px;padding:6px 10px;font-size:12px;width:200px;outline:none}
.conn input:focus{border-color:var(--gl)}
.conn .dot{width:10px;height:10px;border-radius:50%;background:#64748b;transition:.2s}
.conn.live .dot{background:#22c55e;box-shadow:0 0 10px #22c55e}
.conn button{border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;background:#475569;color:#e2e8f0;transition:.15s}
.conn button:hover{background:#64748b}

/* ============ PHONE FRAME — Cartoon Style ============ */
.phone{position:relative;width:390px;height:820px;background:var(--bg);border-radius:52px;overflow:hidden;
  box-shadow:0 0 0 5px var(--ink),0 0 0 8px #fff,0 20px 60px rgba(0,0,0,.5);display:none;border:4px solid var(--ink)}
.phone.show{display:block}
.phone.slave{background:var(--tbg)}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:var(--ink);border-radius:0 0 24px 24px;z-index:60}
.screen{position:absolute;inset:0;overflow-y:auto;padding-bottom:88px;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}

/* ============ PAGES — Bounce Animation ============ */
.page{display:none;min-height:100%;animation:cartoonIn .35s cubic-bezier(.34,1.56,.64,1)}
.page.active{display:block}
@keyframes cartoonIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}

/* ============ APPBAR — Cartoon Banner ============ */
.appbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:20px 22px 18px;font-size:20px;font-weight:800;color:#fff;
  background:var(--grad-g);box-shadow:0 4px 0 rgba(0,0,0,.15);border-bottom:3px solid rgba(0,0,0,.1)}
.phone.slave .appbar{background:var(--grad-t)}
.appbar .act{font-size:16px;font-weight:700;cursor:pointer;opacity:.95;display:flex;align-items:center;gap:4px;text-shadow:1px 1px 0 rgba(0,0,0,.2)}
.appbar .back{font-size:24px;cursor:pointer;font-weight:900;line-height:1;padding:4px 10px;border-radius:12px;transition:.15s;text-shadow:1px 1px 0 rgba(0,0,0,.2)}
.appbar .back:hover{background:rgba(255,255,255,.2)}

/* ============ TAB BAR — Cartoon Floating ============ */
.tabs{position:absolute;bottom:18px;left:18px;right:18px;height:68px;background:var(--card);border:var(--border);
  border-radius:28px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;justify-content:space-around;z-index:40}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;flex:1;transition:color .15s;position:relative}
.tab .ic{font-size:22px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.tab.on{color:var(--gd)}
.tab.on .ic{transform:scale(1.3) translateY(-3px)}
.tab.on::after{content:'';position:absolute;bottom:-4px;width:6px;height:6px;border-radius:50%;background:var(--gd)}
.phone.slave .tab.on{color:var(--td)}
.phone.slave .tab.on::after{background:var(--td)}

/* ============ LAYOUT ============ */
.pad{padding:20px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}

/* ============ TYPOGRAPHY — Cartoon Bold ============ */
.h0{font-size:28px;font-weight:900;letter-spacing:-.5px;text-shadow:1px 1px 0 rgba(0,0,0,.06)}
.h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.h2{font-size:17px;font-weight:700}
.h3{font-size:15px;font-weight:700}
.sub{color:var(--muted);font-size:13px;line-height:1.5}
.sub2{color:var(--muted2);font-size:12px;line-height:1.4}
.hint{font-size:11px;color:var(--muted2);text-align:center;margin-top:8px}

/* ============ CARD — Cartoon Card (thick border + hard shadow) ============ */
.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:var(--border-thin);transition:transform .12s,box-shadow .12s}
.card.click{cursor:pointer}
.card.click:active{transform:scale(.96) translateY(2px);box-shadow:var(--shadow-sm)}
.card.flat{box-shadow:none;border:2px solid var(--line)}
.card.glow{box-shadow:var(--shadow),0 0 0 3px var(--gl)}
.card.pop{box-shadow:var(--shadow-lg)}

/* ============ CHIPS — Cartoon Bubbles ============ */
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--radius-pill);font-size:11px;font-weight:800;border:2px solid var(--ink)}
.chip.ok{background:#C8E6C9;color:var(--gd)}
.chip.warn{background:#FFE0B2;color:var(--orange)}
.chip.off{background:#ECEFF1;color:#607D8B}
.chip.info{background:#BBDEFB;color:#1565C0}
.chip.purple{background:#E1BEE7;color:var(--purple)}
.cat{display:inline-flex;align-items:center;padding:8px 16px;border-radius:var(--radius-pill);font-size:12px;font-weight:800;background:#fff;color:var(--muted);border:2px solid var(--line);white-space:nowrap;cursor:pointer;transition:all .15s}
.cat.on{background:var(--g);color:#fff;border-color:var(--ink);box-shadow:var(--shadow-sm)}
.cat:active{transform:scale(.93)}
.phone.slave .cat.on{background:var(--t);border-color:var(--ink)}

/* ============ BUTTONS — Cartoon Buttons (bold, 3D press) ============ */
.btn{border:var(--border-thin);border-radius:var(--radius-sm);padding:15px 18px;font-size:15px;font-weight:800;cursor:pointer;width:100%;transition:transform .08s,box-shadow .08s;letter-spacing:-.2px}
.btn:active{transform:translateY(3px);box-shadow:var(--shadow-sm)}
.btn-pri{background:var(--grad-g);color:#fff;box-shadow:0 5px 0 var(--gd)}
.btn-pri:active{box-shadow:0 2px 0 var(--gd)}
.btn-teal{background:var(--grad-t);color:#fff;box-shadow:0 5px 0 var(--td)}
.btn-teal:active{box-shadow:0 2px 0 var(--td)}
.btn-gh{background:#fff;color:var(--gd);border:var(--border-thin);box-shadow:0 4px 0 var(--line)}
.btn-gh:active{box-shadow:0 1px 0 var(--line)}
.btn-ght{background:#fff;color:var(--td);border:var(--border-thin);box-shadow:0 4px 0 var(--line)}
.btn-ght:active{box-shadow:0 1px 0 var(--line)}
.btn-red{background:#fff;color:var(--red);border:var(--border-thin);box-shadow:0 4px 0 var(--line)}
.btn-red:active{box-shadow:0 1px 0 var(--line)}
.btn-lime{background:var(--grad-lime);color:var(--gd);box-shadow:0 5px 0 var(--gd)}
.btn-lime:active{box-shadow:0 2px 0 var(--gd)}
.btn:disabled{opacity:.5;box-shadow:none}
.btn.sm{width:auto;padding:10px 16px;font-size:13px;border-radius:var(--radius-xs);box-shadow:0 3px 0 var(--line)}
.btn.sm:active{box-shadow:0 1px 0 var(--line)}
.btn-pri.sm{box-shadow:0 3px 0 var(--gd)}
.btn-teal.sm{box-shadow:0 3px 0 var(--td)}

/* ============ INPUTS — Cartoon Fields ============ */
input.f,select.f,textarea.f{width:100%;border:var(--border-thin);border-radius:var(--radius-sm);padding:14px 16px;font-size:15px;font-family:inherit;background:#fff;transition:border-color .15s,box-shadow .15s;box-shadow:0 3px 0 var(--line2)}
input.f:focus{outline:none;border-color:var(--g);box-shadow:0 3px 0 var(--gl)}
.phone.slave input.f:focus{border-color:var(--t);box-shadow:0 3px 0 var(--tl)}
.lbl{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:-4px}

/* ============ WEATHER CARD — Cartoon Sky ============ */
.weather{background:var(--grad-weather);color:#fff;border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow);border:var(--border-thin)}
.weather::after{content:'';position:absolute;top:-15px;right:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.15)}
.weather::before{content:'☁️';position:absolute;bottom:10px;right:20px;font-size:24px;opacity:.4}
.weather .temp{font-size:38px;font-weight:900;line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.weather .meta{display:flex;gap:16px;margin-top:10px;font-size:13px;opacity:.95;font-weight:700}
.weather .factor{margin-top:12px;font-size:12px;background:rgba(255,255,255,.25);padding:10px 14px;border-radius:14px;display:inline-flex;align-items:center;gap:6px;font-weight:800;border:2px solid rgba(255,255,255,.2)}

/* ============ TOGGLE — Cartoon Switch ============ */
.toggle{width:52px;height:30px;border-radius:var(--radius-pill);background:#E0E0E0;position:relative;cursor:pointer;transition:.2s;flex:0 0 auto;border:var(--border-thin)}
.toggle.on{background:var(--g)}
.phone.slave .toggle.on{background:var(--t)}
.toggle i{position:absolute;top:1px;left:1px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 4px rgba(0,0,0,.2);border:2px solid var(--ink)}
.toggle.on i{left:25px}

/* ============ CAMERA — Cartoon Frame ============ */
.cam{height:200px;border-radius:var(--radius);background:var(--grad-cam);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-lg);border:var(--border)}
.cam .rec{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.5);padding:6px 12px;border-radius:12px;font-size:11px;font-weight:800;border:2px solid rgba(255,255,255,.3)}
.cam .rec i{width:8px;height:8px;border-radius:50%;background:#FF5252;animation:blink 1.2s infinite;border:1px solid #fff}
.cam .cross{position:absolute;width:65%;height:65%;border:3px dashed rgba(255,255,255,.5);border-radius:14px}
.cam .emoji{font-size:56px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.scanline{position:absolute;left:10%;right:10%;height:4px;background:linear-gradient(90deg,transparent,#C6FF00,transparent);box-shadow:0 0 16px #C6FF00;animation:scan 2s linear infinite;border-radius:2px}
@keyframes scan{0%{top:10%}100%{top:90%}}
@keyframes blink{50%{opacity:.15}}

/* ============ AI GAUGE — Cartoon Bar ============ */
.gauge{display:flex;align-items:center;gap:10px}
.gauge .bar{flex:1;height:12px;background:var(--line2);border-radius:6px;overflow:hidden;border:2px solid var(--ink)}
.gauge .fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.gauge .val{font-size:13px;font-weight:900;min-width:40px;text-align:right}

/* ============ LOG ============ */
.log{font-family:'Courier New',monospace;font-size:11px;color:var(--ink2);line-height:1.8;max-height:160px;overflow:auto}
.log br+br{display:none}

/* ============ PULSE — Cartoon Bounce ============ */
.pulse{width:12px;height:12px;border-radius:50%;background:var(--g);display:inline-block;animation:cartoonPulse 1.5s infinite;border:2px solid var(--ink)}
.phone.slave .pulse{background:var(--t)}
@keyframes cartoonPulse{0%{box-shadow:0 0 0 0 rgba(76,175,80,.5);transform:scale(1)}50%{transform:scale(1.2)}70%{box-shadow:0 0 0 10px rgba(76,175,80,0)}100%{box-shadow:0 0 0 0 rgba(76,175,80,0);transform:scale(1)}}

/* ============ CODE BOX — Comic Panel ============ */
.codebox{background:linear-gradient(135deg,#2D3436,#4A4A4A);color:#C6FF00;border-radius:var(--radius);padding:30px;text-align:center;letter-spacing:12px;font-size:40px;font-weight:900;font-family:'Courier New',monospace;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;border:var(--border)}
.codebox::after{content:'';position:absolute;bottom:0;left:0;right:0;height:5px;background:var(--grad-lime)}

/* ============ NOTIFICATION — Comic Sticky Note ============ */
.noti{border-left:5px solid var(--line);padding:16px 18px;border-radius:var(--radius-sm);background:#FFFDE7;box-shadow:var(--shadow-sm);transition:transform .1s;border:var(--border-thin);border-left-width:6px}
.noti:active{transform:scale(.98)}

/* ============ TOAST — Cartoon Speech Bubble ============ */
.toast{position:absolute;bottom:100px;left:20px;right:20px;background:var(--card);color:var(--ink);padding:16px 20px;border-radius:18px;font-size:14px;font-weight:700;z-index:70;opacity:0;transform:translateY(10px) scale(.9);transition:.3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:var(--shadow-lg);border:var(--border)}
.toast::before{content:'';position:absolute;bottom:-8px;left:30px;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:12px solid var(--ink)}
.toast::after{content:'';position:absolute;bottom:-5px;left:32px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid var(--card)}
.toast.show{opacity:1;transform:none}

/* ============ STAT ============ */
.stat{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:2px dashed var(--line2);font-size:14px}
.stat:last-child{border:none}
.stat .v{font-weight:900}

/* ============ AVATAR — Cartoon Face ============ */
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto;border:var(--border-thin)}
.avatar.g{background:#C8E6C9}
.avatar.t{background:#B2DFDB}
.avatar.a{background:#FFE0B2}
.avatar.b{background:#BBDEFB}

/* ============ BADGE — Cartoon Star ============ */
.badge{position:absolute;top:-6px;right:-6px;min-width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--ink);box-shadow:0 2px 4px rgba(0,0,0,.2)}

/* ============ FAB — Cartoon Action Button ============ */
.fab{position:absolute;bottom:98px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--grad-g);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 0 var(--gd);z-index:45;transition:transform .1s;border:var(--border)}
.fab:active{transform:translateY(4px);box-shadow:0 2px 0 var(--gd)}
.phone.slave .fab{background:var(--grad-t);box-shadow:0 6px 0 var(--td);border-color:var(--ink)}
.phone.slave .fab:active{box-shadow:0 2px 0 var(--td)}

/* ============ DIVIDER — Dashed Cartoon Line ============ */
.div{height:0;border:none;border-top:2px dashed var(--line);margin:6px 0}

/* ============ EMPTY — Cartoon Illustration ============ */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .emoji{font-size:56px;margin-bottom:14px;animation:bob 2.5s ease-in-out infinite}

/* ============ PLANT CARD — Cartoon Pot ============ */
.plant-card{position:relative;overflow:hidden}
.plant-card .stripe{position:absolute;left:0;top:0;bottom:0;width:6px;border-radius:0 4px 4px 0}
.plant-card .stripe.seedling{background:#A5D6A7}
.plant-card .stripe.vegetative{background:#66BB6A}
.plant-card .stripe.flowering{background:#FFA000}
.plant-card .stripe.fruiting{background:#E53935}

/* ============ PRODUCT GRID — Cartoon Shop ============ */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prod{background:#fff;border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s;position:relative;border:var(--border-thin)}
.prod:active{transform:scale(.94) translateY(2px)}
.prod .emoji{font-size:40px;margin-bottom:6px}
.prod .name{font-size:13px;font-weight:800;line-height:1.3;max-height:36px;overflow:hidden}
.prod .price{font-size:17px;font-weight:900;color:var(--gd);margin-top:4px}
.prod .rating{font-size:11px;color:var(--muted);margin-top:2px}

/* ============ SCROLL H ============ */
.scroll-h{display:flex;gap:10px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.scroll-h::-webkit-scrollbar{display:none}
.scroll-h .item{min-width:150px;flex:0 0 auto}

/* ============ SPINNER — Cartoon Bounce ============ */
.spin{width:32px;height:32px;border:4px solid var(--line);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;border-right-color:var(--gl)}
.phone.slave .spin{border-top-color:var(--t);border-right-color:var(--tl)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ COMIC BURST ============ */
.burst{display:inline-block;background:var(--grad-sun);color:var(--ink);padding:4px 12px;border-radius:var(--radius-pill);font-weight:900;font-size:12px;border:var(--border-thin);box-shadow:var(--shadow-sm)}
</style>
</head>
<body>
<div class="top">
  <div class="title">🎨 OOJOO FARM <small>· Cartoon Edition · 390×820</small></div>
  <div class="switch">
    <button id="swM" class="on m" onclick="setApp('master')">Master</button>
    <button id="swS" class="s" onclick="setApp('slave')">Farmer</button>
  </div>
  <div class="conn" id="conn">
    <span class="dot"></span>
    <span id="connLabel">Mock</span>
    <input id="baseUrl" value="http://localhost:4000" placeholder="Backend URL">
    <button onclick="toggleLive()">Live</button>
  </div>
</div>

<!-- ===================== MASTER ===================== -->
<div class="phone master show" id="phoneM">
  <div class="notch"></div>
  <div class="screen" id="mScreen"></div>
  <div class="tabs" id="mTabs" style="display:none">
    <div class="tab" data-t="home" onclick="mGo('home')"><span class="ic">🏡</span>홈</div>
    <div class="tab" data-t="plants" onclick="mGo('plants')"><span class="ic">🌱</span>식물</div>
    <div class="tab" data-t="farmers" onclick="mGo('farmers')"><span class="ic">🤖</span>Farmer</div>
    <div class="tab" data-t="market" onclick="mGo('market')"><span class="ic">🛒</span>마켓</div>
    <div class="tab" data-t="community" onclick="mGo('community')"><span class="ic">🏘️</span>이웃</div>
  </div>
  <div class="toast" id="mToast"></div>
</div>

<!-- ===================== SLAVE ===================== -->
<div class="phone slave" id="phoneS">
  <div class="notch"></div>
  <div class="screen" id="sScreen"></div>

// ============ API ============
async function api(path, opts){
  if(!S.live) throw new Error('mock');
  const r = await fetch(S.base.replace(/\/$/,'') + path, { headers:{'Content-Type':'application/json', ...(opts&&opts.headers)}, ...opts });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
const jpost=(p,b,h)=>api(p,{method:'POST',body:JSON.stringify(b),headers:h});
const jget=(p,h)=>api(p,{headers:h});

function toggleLive(){
  S.base = document.getElementById('baseUrl').value.trim();

  document.getElementById('connLabel').textContent = S.live?'Live':'Mock';
  toast(S.app, S.live? '백엔드 연결됨!':'Mock 모드');
}

  document.getElementById('swS').className='s'+(a==='slave'?' on':'');
}
function toast(app,msg){
  const t=document.getElementById(app==='master'?'mToast':'sToast');
  t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2400);

async function mGo(page){

      S.m.weather=await jget('/api/weather/'+encodeURIComponent(S.m.region));
    } else { S.m.slaves=MOCK.slaves; S.m.plants=MOCK.plants; S.m.weather=MOCK.weather; }
  }catch(e){ S.m.slaves=MOCK.slaves; S.m.plants=MOCK.plants; S.m.weather=MOCK.weather; toast('master','조회 실패 — Mock 표시'); }

      S.m.categories=(await jget('/api/market/categories')).categories;
      S.m.products=(await jget('/api/market/products'+mkQuery())).products;
      S.m.bundles=(await jget('/api/market/bundles')).bundles;
      S.m.recos=(await jget('/api/market/recommendations/'+S.m.userId)).recommendations;
    } else {
      S.m.categories=MOCK.categories;
      S.m.products=MOCK.products.filter(p=>(S.m.mkCat==='all'||p.category===S.m.mkCat) && (!S.m.mkQuery||(p.name+p.description).toLowerCase().includes(S.m.mkQuery.toLowerCase())));
      S.m.bundles=MOCK.bundles;
      S.m.recos=MOCK.products.filter(p=>['prd_ctrl_01','prd_fert_01','prd_seed_01'].includes(p.id));
    }
  }catch(e){ S.m.categories=MOCK.categories; S.m.products=MOCK.products; S.m.bundles=MOCK.bundles; S.m.recos=[]; toast('master','마켓 조회 실패'); }
}
function mkQuery(){ const q=[]; if(S.m.mkCat!=='all')q.push('category='+S.m.mkCat); if(S.m.mkQuery)q.push('q='+encodeURIComponent(S.m.mkQuery)); return q.length?'?'+q.join('&'):''; }

async function mLoadCommunity(){
  try{
    if(S.live){
      const q=['region='+encodeURIComponent(S.m.region),'viewerId='+S.m.userId];
      if(S.m.cType)q.push('type='+S.m.cType); if(S.m.cQuery)q.push('q='+encodeURIComponent(S.m.cQuery));
      S.m.cposts=(await jget('/api/community/posts?'+q.join('&'))).posts;
    } else {
      S.m.cposts=MOCK.cposts.filter(p=>(!S.m.cType||p.type===S.m.cType) && (!S.m.cQuery||(p.title+(p.crop||'')).toLowerCase().includes(S.m.cQuery.toLowerCase())));

  try{
    const wf=(S.m.weather&&S.m.weather.weatherFactor)||1;
    if(S.live) await jpost('/api/commands',{slaveId:s.id,action:'water',amountMl:Math.round(300*wf),weatherFactor:wf});
    toast('master','💧 관수 지시 전송! → '+(s.name||s.id));
  }catch(e){ toast('master','전송 실패: '+e.message); }
}

async function mGenCode(){

    let code,exp;

    else { code=Math.random().toString(36).slice(2,8).toUpperCase(); exp='10분 후'; }
    S.m.pairCode=code;
    document.getElementById('mCodeBox').innerHTML=`<div class="codebox">${code}</div><div class="hint">유효: ${esc(exp)} — 이 코드를 Farmer 앱에 입력!</div>`;
    toast('master','🔑 페어링 코드: '+code);

}

async function mSubscribe(plan){ try{ if(S.live) await jpost('/api/subscription',{userId:S.m.userId,plan}); }catch(e){} S.m.plan=plan; toast('master',(plan==='premium'?'⭐ 프리미엄':'무료')+' 전환!'); mGo('sub'); }

// ---- MARKET ----
function cartCount(){ return S.m.cart.reduce((a,c)=>a+c.qty,0); }
function cartTotal(){ return S.m.cart.reduce((a,c)=>a+c.price*c.qty,0); }
function cartAdd(id){ const p=(S.m.products.concat(MOCK.products)).find(x=>x.id===id); if(!p)return; const e=S.m.cart.find(c=>c.id===id); if(e)e.qty++; else S.m.cart.push({id:p.id,name:p.name,price:p.price,image:p.image,qty:1}); toast('master','🛒 장바구니에 담았어요!'); }
function cartAddRaw(o){ const e=S.m.cart.find(c=>c.id===o.id); if(e)e.qty++; else S.m.cart.push({id:o.id,name:o.name,price:o.price,image:o.image||'📦',qty:1}); }
function cartInc(id){ const e=S.m.cart.find(c=>c.id===id); if(e)e.qty++; mGo('cart'); }
function cartDec(id){ const i=S.m.cart.findIndex(c=>c.id===id); if(i<0)return; if(S.m.cart[i].qty>1)S.m.cart[i].qty--; else S.m.cart.splice(i,1); mGo('cart'); }

function mMarket(){
  const chips=`<span class="cat ${S.m.mkCat==='all'?'on':''}" onclick="mkCat('all')">전체</span>`+
    S.m.categories.map(c=>`<span class="cat ${S.m.mkCat===c.key?'on':''}" onclick="mkCat('${c.key}')">${esc(c.label)} ${c.count}</span>`).join('');
  const grid=S.m.products.map(p=>`
    <div class="prod" onclick="mOpenProduct('${p.id}')">
      <div class="emoji">${p.image||'🛒'}</div>
      <div class="name">${esc(p.name)}</div>
      <div class="rating">⭐ ${p.rating} · ${p.affiliate_url?'제휴':'자체'}</div>
      <div class="price">${won(p.price)}</div>
    </div>`).join('') || '<div class="sub">상품이 없어요</div>';
  let reco='';
  if(S.m.mkCat==='all' && !S.m.mkQuery && S.m.recos.length){
    reco=`<div class="h2">🎯 내 식물 맞춤 추천!</div><div class="scroll-h">`+
      S.m.recos.map(p=>`<div class="item card click" style="padding:14px" onclick="mOpenProduct('${p.id}')"><div style="font-size:32px">${p.image}</div><div class="h3" style="font-size:13px;margin-top:4px">${esc(p.name)}</div><div style="color:var(--gd);font-weight:900;font-size:15px">${won(p.price)}</div></div>`).join('')+`</div>`;
  }
  let bundles='';
  if(S.m.mkCat==='all' && !S.m.mkQuery && S.m.bundles.length){
    bundles=`<div class="h2">📦 추천 번들 키트!</div>`+S.m.bundles.map(b=>`
      <div class="card"><div class="row"><div style="font-size:32px">${b.image}</div>
      <div style="flex:1"><div class="h3">${esc(b.name)}</div><div class="sub">${esc(b.description)}</div></div>
      <div style="color:var(--gd);font-weight:900;font-size:18px">${won(b.price)}</div></div>
      <div class="sub" style="margin-top:6px">구성: ${b.items.map(i=>i.name).join(', ')}</div>
      <button class="btn btn-gh sm" style="width:100%;margin-top:8px" onclick='mBundleAdd(${JSON.stringify(b.items)})'>번들 담기!</button></div>`).join('');
  }
  return `<div class="appbar">🛒 마켓 <span class="act" onclick="mGo('cart')" style="position:relative">🛒${cartCount()?'<span class="badge">'+cartCount()+'</span>':''}</span></div><div class="pad">
    <input class="f" placeholder="상품 검색 (비료, 토마토, ESP32…)" value="${esc(S.m.mkQuery)}" oninput="S.m.mkQuery=this.value" onkeydown="if(event.key==='Enter')mGo('market')">
    <div class="scroll-h">${chips}</div>
    ${reco}${bundles}
    <div class="h2">🛍️ 상품</div>
    <div class="prod-grid">${grid}</div>
    <button class="btn btn-gh" onclick="mGo('orders')">주문 내역</button>
  </div>`;
}
function mkCat(c){ S.m.mkCat=c; mGo('market'); }
function mOpenProduct(id){ S.m.curProduct=(S.m.products.concat(MOCK.products)).find(p=>p.id===id); mGo('product'); }
function mBundleAdd(items){ items.forEach(cartAddRaw); toast('master','📦 번들 담았어요!'); mGo('market'); }

function mProduct(){
  const p=S.m.curProduct; if(!p) return '<div class="pad">상품 없음</div>';
  const buy = p.affiliate_url
    ? `<button class="btn btn-pri" onclick="mAffiliate('${p.id}')">제휴몰에서 구매 ↗</button><div class="hint">외부 제휴 상품 (CPS/CPA)</div>`
    : `<button class="btn btn-pri" onclick="cartAdd('${p.id}')">🛒 장바구니 담기</button><button class="btn btn-gh" onclick="cartAdd('${p.id}');mGo('cart')">바로 구매!</button>`;
  return `<div class="appbar"><span class="back" onclick="mGo('market')">‹</span> 상품 <span></span></div><div class="pad" style="text-align:center">
    <div style="font-size:80px;margin:10px 0;animation:bob 2s infinite">${p.image||'🛒'}</div>
    <div class="h0" style="text-align:left">${esc(p.name)}</div>
    <div class="sub" style="text-align:left;margin-top:6px">⭐ ${p.rating} · ${esc(p.vendor||'')} · 재고 ${p.stock}</div>
    <div class="h0" style="color:var(--gd);text-align:left;margin-top:8px">${won(p.price)}</div>
    <p class="sub" style="text-align:left;margin-top:10px">${esc(p.description||'')}</p>
    ${buy}
  </div>`;
}
async function mAffiliate(id){ try{ let url='https://example.com'; if(S.live) url=(await jpost('/api/market/affiliate/'+id,{userId:S.m.userId})).url; else { const p=MOCK.products.find(x=>x.id===id); url=p.affiliate_url; } toast('master','제휴몰로 이동!'); window.open(url,'_blank'); }catch(e){ toast('master','실패: '+e.message); } }

function mCart(){
  const lines=S.m.cart.map(c=>`<div class="card"><div class="row">
    <div style="font-size:32px">${c.image||'🛒'}</div>
    <div style="flex:1"><div class="h3">${esc(c.name)}</div><div class="sub">${won(c.price)}</div></div>
    <button class="btn btn-gh sm" onclick="cartDec('${c.id}')">−</button>
    <span style="min-width:26px;text-align:center;font-weight:900">${c.qty}</span>
    <button class="btn btn-gh sm" onclick="cartInc('${c.id}')">+</button>
  </div></div>`).join('') || '<div class="card"><div class="empty"><div class="emoji">🛒</div>장바구니가 비어 있어요!</div></div>';
  const foot=S.m.cart.length?`<div class="between" style="padding:4px 2px"><div class="h2">합계</div><div class="h2" style="color:var(--gd)">${won(cartTotal())}</div></div>
    <button class="btn btn-pri" onclick="mCheckout()">💳 결제하기 (${won(cartTotal())})</button>`:'';
  return `<div class="appbar"><span class="back" onclick="mGo('market')">‹</span> 🛒 장바구니 <span></span></div><div class="pad">${lines}${foot}
    <button class="btn btn-gh" onclick="mGo('orders')">주문 내역</button></div>`;
}
async function mCheckout(){ if(!S.m.cart.length) return; try{ let total=cartTotal(), id='ord_'+Date.now().toString(36); if(S.live){ const r=await jpost('/api/market/orders',{userId:S.m.userId,items:S.m.cart.map(c=>({productId:c.id,qty:c.qty}))}); total=r.total; id=r.orderId; } else { S.m.orders.unshift({id,total,status:'paid',created_at:new Date().toISOString().slice(0,16).replace('T',' '),items:S.m.cart.map(c=>({name:c.name,qty:c.qty,price:c.price}))}); } S.m.cart=[]; toast('master','✅ 결제 완료! '+id.slice(0,8)); mGo('orders'); }catch(e){ toast('master','결제 실패: '+e.message); } }
function mOrders(){
  const list=(S.m.orders||[]).map(o=>`<div class="card"><div class="between"><div class="h3">주문 ${esc(o.id.slice(0,8))}</div><div class="h3" style="color:var(--gd)">${won(o.total)}</div></div>
    <div class="sub2">${esc(o.status||'')} · ${esc(o.created_at||'')}</div>
    ${(o.items||[]).map(i=>`<div class="sub">· ${esc(i.name)} ×${i.qty}</div>`).join('')}</div>`).join('') || '<div class="card"><div class="empty"><div class="emoji">📦</div>주문 내역이 없어요!</div></div>';
  return `<div class="appbar"><span class="back" onclick="mGo('market')">‹</span> 📦 주문 내역 <span></span></div><div class="pad">${list}</div>`;
}

// ---- COMMUNITY ----
function mCommunity(){
  const chip=(t,l)=>`<span class="cat ${S.m.cType===t?'on':''}" onclick="cType(${t===null?'null':`'${t}'`})">${l}</span>`;
  const feed=S.m.cposts.map(p=>`
    <div class="card click" onclick="mOpenPost('${p.id}')">
      <div class="row" style="gap:8px;margin-bottom:6px">
        <span class="chip ${p.type==='sell'?'warn':'ok'}">${cTypeL(p.type)}</span>
        <div class="h3" style="flex:1">${esc(p.title)}</div>
        ${p.type==='sell'&&p.price?`<div style="color:var(--gd);font-weight:900">${won(p.price)}</div>`:''}
      </div>
      <div class="sub">${esc([p.crop,p.quantity].filter(Boolean).join(' · ')||p.description||'')}</div>
      <div class="between" style="margin-top:8px">
        <div class="row" style="gap:6px"><div class="avatar a" style="width:26px;height:26px;font-size:14px">${p.image||'🙂'}</div><span class="sub2">${esc(p.author_name||'이웃')} · ⭐${p.author_score} (${p.author_deals}거래)</span></div>
        ${cStatusL(p.status)?`<span class="chip off">${cStatusL(p.status)}</span>`:''}
      </div>
    </div>`).join('') || `<div class="card"><div class="empty"><div class="emoji">🏘️</div>${esc(S.m.region)} 지역에 글이 없어요!<br>첫 글을 올려보세요!</div></div>`;
  return `<div class="appbar">🏘️ 이웃 · ${esc(S.m.region)} <span class="act" onclick="mGo('cwrite')">＋ 글쓰기</span></div><div class="pad">
    <input class="f" placeholder="작물/제목 검색" value="${esc(S.m.cQuery)}" oninput="S.m.cQuery=this.value" onkeydown="if(event.key==='Enter')mGo('community')">
    <div class="scroll-h">${chip(null,'전체')}${chip('share','나눔')}${chip('sell','판매')}${chip('buy','구입')}</div>
    ${feed}
  </div><div class="fab" onclick="mGo('cwrite')">✏️</div>`;
}
function cType(t){ S.m.cType=t; mGo('community'); }
function mOpenPost(id){ S.m.curPost=S.m.cposts.find(p=>p.id===id)||MOCK.cposts.find(p=>p.id===id); mGo('post'); }
function mPost(){
  const p=S.m.curPost; if(!p) return '<div class="pad">게시물 없음</div>';
  const isAuthor=S.live?(p.user_id===S.m.userId):false;
  const comments=(p.comments||[]).map(c=>`<div class="card flat" style="padding:14px"><div class="row" style="gap:6px;margin-bottom:4px"><div class="avatar b" style="width:26px;height:26px;font-size:14px">🙂</div><b style="font-size:12px">${esc(c.author_name||'이웃')}</b></div><div>${esc(c.body)}</div><div class="sub2">${esc(c.created_at||'')}</div></div>`).join('')||'<div class="sub">첫 댓글을 남겨보세요!</div>';
  const authorActions=isAuthor?`<div class="row"><button class="btn btn-gh sm" style="flex:1" onclick="cSetStatus('reserved')">예약중</button><button class="btn btn-pri sm" style="flex:1" onclick="cSetStatus('done')">거래완료!</button></div>`:`<div class="row"><button class="btn btn-red sm" style="flex:1" onclick="cReport()">신고</button><button class="btn btn-gh sm" style="flex:1" onclick="cBlock()">차단</button></div>`;
  return `<div class="appbar"><span class="back" onclick="mGo('community')">‹</span> 게시물 <span></span></div><div class="pad">
    <div class="card">
      <div class="row" style="gap:8px;margin-bottom:8px"><span class="chip ${p.type==='sell'?'warn':'ok'}">${cTypeL(p.type)}</span><div class="h1" style="flex:1">${esc(p.title)}</div></div>
      ${p.type==='sell'&&p.price?`<div style="color:var(--gd);font-weight:900;font-size:20px;margin-bottom:6px">${won(p.price)}</div>`:''}
      <div class="sub">작물: ${esc(p.crop||'-')} · 수량: ${esc(p.quantity||'-')}</div>
      <div class="sub">지역: ${esc(p.region||'-')}</div>
      ${p.description?`<div style="margin-top:8px;line-height:1.5">${esc(p.description)}</div>`:''}
      <div class="div"></div>
      <div class="row" style="gap:6px"><div class="avatar a" style="width:30px;height:30px;font-size:16px">${p.image||'🙂'}</div><span class="sub2">${esc(p.author_name||'이웃')} · ⭐${p.author_score} (${p.author_deals}거래) · ${cStatusL(p.status)||'거래 가능'}</span></div>
    </div>
    ${authorActions}
    <div class="h2">💬 댓글 (${(p.comments||[]).length})</div>
    ${comments}
    <div class="row"><input class="f" id="cCmt" placeholder="댓글 달기" style="flex:1"><button class="btn btn-pri sm" onclick="cAddComment()">등록</button></div>
  </div>`;
}
async function cAddComment(){ const el=document.getElementById('cCmt'); const b=el.value.trim(); if(!b)return; const p=S.m.curPost; try{ if(S.live) await jpost('/api/community/posts/'+p.id+'/comments',{userId:S.m.userId,body:b}); }catch(e){} p.comments=(p.comments||[]); p.comments.push({author_name:S.m.nickname||'나',body:b,created_at:'방금'}); mGo('post'); toast('master','💬 댓글 등록!'); }
async function cSetStatus(s){ const p=S.m.curPost; try{ if(S.live) await fetch(S.base.replace(/\/$/,'')+'/api/community/posts/'+p.id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})}); }catch(e){} p.status=s; mGo('post'); toast('master',cStatusL(s)||'판매중'); }
async function cReport(){ const p=S.m.curPost; try{ if(S.live) await jpost('/api/community/report',{reporterId:S.m.userId,postId:p.id,reason:'부적절'}); }catch(e){} toast('master','신고 접수됨'); }
async function cBlock(){ const p=S.m.curPost; try{ if(S.live) await jpost('/api/community/block',{blockerId:S.m.userId,blockedId:p.user_id}); }catch(e){} S.m.cposts=S.m.cposts.filter(x=>x.id!==p.id); mGo('community'); toast('master','차단됨'); }

let _cwType='share', _cwEmoji='🥬';
function mCwrite(){
  const chip=(t,l)=>`<span class="cat ${_cwType===t?'on':''}" onclick="_cwType='${t}';mGo('cwrite')">${l}</span>`;
  const emo=['🥬','🍅','🌿','🌱','🥕','🌶️','🍓','🙂'].map(e=>`<span class="cat ${_cwEmoji===e?'on':''}" onclick="_cwEmoji='${e}';mGo('cwrite')">${e}</span>`).join('');
  return `<div class="appbar"><span class="back" onclick="mGo('community')">‹</span> ✏️ 글쓰기 · ${esc(S.m.region)} <span></span></div><div class="pad">
    <div class="lbl">유형</div><div class="scroll-h">${chip('share','🎁 나눔')}${chip('sell','💰 판매')}${chip('buy','🔍 구입')}</div>
    <div class="lbl">제목 *</div><input class="f" id="cwTitle" placeholder="상추 나눔해요!">
    <div class="lbl">작물</div><input class="f" id="cwCrop" placeholder="상추, 토마토">
    <div class="lbl">수량</div><input class="f" id="cwQty" placeholder="한 봉지, 1kg">
    ${_cwType==='sell'?'<div class="lbl">가격(원)</div><input class="f" id="cwPrice" inputmode="numeric" placeholder="5000">':''}
    <div class="lbl">설명</div><textarea class="f" id="cwDesc" rows="3" placeholder="자세한 내용"></textarea>
    <div class="lbl">대표 이모지</div><div class="scroll-h">${emo}</div>
    <button class="btn btn-pri" onclick="cSubmit()">게시하기!</button>
  </div>`;
}
async function cSubmit(){
  const title=document.getElementById('cwTitle').value.trim();
  if(!title){ toast('master','제목을 입력하세요!'); return; }
  const body={userId:S.m.userId,type:_cwType,title,crop:document.getElementById('cwCrop').value.trim()||null,quantity:document.getElementById('cwQty').value.trim()||null,price:_cwType==='sell'?(parseInt(document.getElementById('cwPrice')?.value)||0):null,region:S.m.region,description:document.getElementById('cwDesc').value.trim()||null,image:_cwEmoji};
  try{ if(S.live) await jpost('/api/community/posts',body); else MOCK.cposts.unshift({id:'cp'+Date.now(),user_id:S.m.userId,...body,status:'open',created_at:'방금',author_name:S.m.nickname||'나',author_score:0,author_deals:0,comments:[]}); toast('master','게시되었어요!'); mGo('community'); }catch(e){ toast('master','등록 실패: '+e.message); }
}

// ==================== SLAVE ====================
function sGo(page){ S.s.page=page; const sc=document.getElementById('sScreen');
  const renderers={pairing:sPairing,dashboard:sDashboard,settings:sSettings};
  sc.innerHTML = renderers[page] ? renderers[page]() : '<div class="empty">준비 중...</div>';
}
function sPairing(){
  return `<div class="appbar">🤝 마스터 연결</div><div class="pad" style="padding-top:30px">
    <div style="text-align:center;margin-bottom:16px"><div style="font-size:64px;margin-bottom:14px;animation:bob 2s infinite">🤖</div>
    <div class="h1">Farmer 페어링</div>
    <div class="sub" style="margin-top:8px">마스터 앱에서 받은 코드를 입력하세요!</div></div>
    <div class="lbl">페어링 코드 (6자리)</div><input class="f" id="spCode" maxlength="6" placeholder="ABC123" style="letter-spacing:6px;text-transform:uppercase;font-weight:800;font-size:22px;text-align:center">
    <div class="lbl">서버 주소</div><input class="f" id="spServer" value="${esc(S.base)}">
    <button class="btn btn-teal" onclick="sVerify()">🔗 연결!</button>
    <div class="hint">Master 앱의 "페어링 코드 생성"에서 만든 코드${S.m.pairCode?' (예: '+S.m.pairCode+')':''}</div>
  </div>`;
}
async function sVerify(){
  const code=document.getElementById('spCode').value.trim().toUpperCase();
  S.base=document.getElementById('spServer').value.trim();
  if(code.length<6){ toast('slave','6자리 코드를 입력하세요!'); return; }
  try{ if(S.live){ const r=await jpost('/api/pairing/verify',{code}); S.s.slaveId=r.slaveId; S.s.sessionKey=r.sessionKey; } else { S.s.slaveId='slv_'+Date.now().toString(36); S.s.sessionKey='mock-session'; } sBoot(); toast('slave','✅ 페어링 완료! 자율 관리 시작!'); sGo('dashboard'); }catch(e){ toast('slave','연결 실패: '+e.message); }
}
function sBoot(){ S.s.logs=['['+t()+'] 엔진 시작!','['+t()+'] 헤드리스 서비스 기동!']; S.s.status='자율 관리 동작 중!'; clearInterval(S.s._loop); S.s._loop=setInterval(()=>{ if(S.s.page!=='dashboard') return; sTick(); },4000); }
function t(){const d=new Date();return d.toTimeString().slice(0,8);}
function sTick(){
  const green=Math.round(20+Math.random()*40), bright=Math.round(30+Math.random()*40);
  const need=green<28&&bright>15, ripeness=Math.round(Math.random()*100), pest=Math.random()<0.25;
  S.s.analysis={green,bright,need,ripeness,pest,status:green>45?'건강! (녹색 충분)':green>25?'보통':'주의! (황변 의심)'};
  sLog('분석: '+S.s.analysis.status+' (녹색:'+green+'%, 익음도:'+ripeness+'%)');
  if(S.s.autoOn&&need){ sLog('AI 판정: 수분 부족 → 자동 관수!'); sWater('auto'); }
  else S.s.status=S.s.autoOn?'관찰 완료: '+S.s.analysis.status:'자율 관리 일시정지';
  if(ripeness>=70) sLog('🍅 수확 적기 감지! → 마스터 알림');
  if(pest){ sLog('🐛 해충 감지! → Fan 자동 퇴치(10초)'); S.s.pendingLaser=true; sLog('🐛 Laser 퇴치 마스터 승인 요청!'); }
  if(S.s.page==='dashboard') document.getElementById('sScreen').innerHTML=sDashboard();
}
function sLog(m){ S.s.logs=['['+t()+'] '+m,...S.s.logs].slice(0,20); }
async function sWater(source){
  const amt=source==='auto'?Math.round(300*1.25):300, ms=Math.min(60000,Math.max(500,amt*20));
  sLog('급수 밸브 개방 '+ms+'ms (하드웨어:'+(S.s.hw?'연결':'시뮬')+')');
  sLog((source==='auto'?'🤖 자율':'✋ 수동')+' 관수 '+amt+'ml');
  S.s.lastWater=t(); S.s.status=(source==='auto'?'🤖 자율':'✋ 수동')+' 관수 실행! ('+amt+'ml)';
  try{ if(S.live&&S.s.slaveId) await jpost('/api/watering/log',{slaveId:S.s.slaveId,amountMl:amt,source,weatherFactor:1.25},{'x-session-key':S.s.sessionKey}); }catch(e){}
  if(S.s.page==='dashboard') document.getElementById('sScreen').innerHTML=sDashboard();
}
function sDashboard(){
  const a=S.s.analysis;
  const logs=S.s.logs.map(l=>esc(l)).join('<br>')||'로그 없음';
  const gauge=(label,val,color)=>`<div class="gauge"><span class="sub" style="min-width:60px;font-weight:700">${label}</span><div class="bar"><div class="fill" style="width:${val}%;background:${color}"></div></div><span class="val">${val}%</span></div>`;
  return `<div class="appbar">🤖 Farmer 대시보드 <span class="act" onclick="sGo('settings')">⚙️ 설정</span></div><div class="pad">
    <div class="card">
      <div class="h2" style="margin-bottom:8px">🧠 온디바이스 AI 자율 관리</div>
      <div class="sub">Slave: ${esc((S.s.slaveId||'').slice(0,8))}… ${S.s.autoOn?'· 🟢 온라인':''}</div>
      <div class="sub">식물: 🍅 방울토마토 (토마토)</div>
      <div class="sub" style="font-weight:800;color:var(--ink)">상태: ${esc(S.s.status)}</div>
      <div class="between" style="margin-top:12px"><span class="sub" style="font-weight:700">자율 관리</span><div class="toggle ${S.s.autoOn?'on':''}" onclick="sToggle('autoOn')"><i></i></div></div>
      <div class="between" style="margin-top:8px"><span class="sub" style="font-weight:700">헤드리스 모드</span><div class="toggle ${S.s.headless?'on':''}" onclick="sToggle('headless')"><i></i></div></div>
      <div class="sub" style="margin-top:8px;font-weight:700">날씨 가중치: ×1.25</div>
    </div>
    <div class="cam"><div class="rec"><i></i>LIVE</div><div class="cross"></div><div class="scanline"></div><div class="emoji">🍅</div></div>
    ${S.s.pendingLaser?`<div class="card" style="background:#FFEBEE;border:3px solid #FFCDD2"><div class="row" style="gap:8px"><span style="font-size:28px">🐛</span><div><div class="h3" style="color:var(--red)">해충 감지!</div><div class="sub">Laser 퇴치 마스터 승인 대기 중</div></div></div></div>`:''}
    ${a?`<div class="card"><div class="h2" style="margin-bottom:10px">🔍 최근 분석</div>
      <div class="sub" style="margin-bottom:8px;font-weight:700">상태: <b>${esc(a.status)}</b></div>
      ${gauge('녹색도',a.green,'#66BB6A')}
      ${gauge('밝기',a.bright,'#FFA000')}
      <div class="sub" style="margin-top:8px;font-weight:700">수분 필요: ${a.need?'<b style="color:var(--red)">예! 💧</b>':'아니오'} · 신뢰도 ${60+Math.round(Math.random()*30)}%</div>
      <div class="sub" style="font-weight:700">열매 익음도: ${a.ripeness||0}% · 해충 의심: ${a.pest?'<b style="color:var(--red)">예! 🐛</b>':'아니오'}</div>
    </div>`:''}
    <div class="row" style="gap:8px"><button class="btn btn-teal" style="flex:1" onclick="sTick()">📸 즉시 캡처!</button><button class="btn btn-ght" style="flex:1" onclick="sWater('manual')">💧 수동 관수</button></div>
    <div class="h2">📋 이벤트 로그</div><div class="card"><div class="log">${logs}</div></div>
  </div>`;
}
function sToggle(k){ S.s[k]=!S.s[k]; if(k==='autoOn') S.s.status=S.s.autoOn?'자율 관리 동작 중!':'자율 관리 일시정지'; if(k==='headless') toast('slave',S.s.headless?'헤드리스 ON!':'헤드리스 OFF'); document.getElementById('sScreen').innerHTML=sDashboard(); }
function sSettings(){
  return `<div class="appbar"><span class="back" onclick="sGo('dashboard')">‹</span> ⚙️ Farmer 설정 <span></span></div><div class="pad">
    <div class="lbl">재배 지역 (날씨 조회용)</div><input class="f" id="stRegion" value="${esc(S.s.region)}">
    <div class="lbl">캡처 주기 (분)</div><input class="f" id="stInterval" value="60">
    <div class="between"><span style="font-weight:700">자율 관수</span><div class="toggle ${S.s.autoOn?'on':''}" onclick="sToggle('autoOn')"><i></i></div></div>
    <div class="div"></div>
    <div class="h2">🔌 하드웨어 (ESP32)</div>
    <button class="btn ${S.s.hw?'btn-teal':'btn-ght'}" onclick="sConnectHw()">${S.s.hw?'✓ BLE 하드웨어 연결됨!':'급수/Fan/Laser BLE 연결'}</button>
    <div class="hint">Nordic UART Service · Fail-safe 자동 정지</div>
    <button class="btn btn-teal" onclick="sSaveSettings()">💾 저장</button>
  </div>`;
}
function sConnectHw(){ S.s.hw=true; sLog('ESP32 BLE 연결됨! (Nordic UART)'); toast('slave','하드웨어 연결됨! 🔌'); sGo('settings'); }
function sSaveSettings(){ S.s.region=document.getElementById('stRegion').value.trim()||'Seoul'; toast('slave','💾 저장됨!'); sGo('dashboard'); }

// ============ INIT ============
mGo('onboarding');
sGo('pairing');
</script>
</body>
</html>
